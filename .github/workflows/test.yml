name: Test license gate

on:
  push:
    paths:
      - validate_license.sh
      - test_validate_license.sh
      - .github/workflows/test.yml
  pull_request:
    paths:
      - validate_license.sh
      - test_validate_license.sh
      - .github/workflows/test.yml
  workflow_dispatch:

jobs:
  test:
    name: Run license-gate tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: ./test_validate_license.sh
